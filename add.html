<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0b1120" />
<title>Thêm giao dịch — Sổ Thu Chi</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<main>
  <h1 id="page-title">Thêm giao dịch</h1>

  <div class="type-toggle">
    <button type="button" id="type-income" class="income">Thu</button>
    <button type="button" id="type-expense" class="expense">Chi</button>
  </div>

  <form id="tx-form">
    <div class="field">
      <label for="f-date">Ngày</label>
      <input type="date" id="f-date" required />
    </div>
    <div class="field">
      <label for="f-category">Danh mục</label>
      <select id="f-category" required></select>
    </div>
    <div class="field">
      <label for="f-amount">Số tiền (VNĐ)</label>
      <input type="text" inputmode="numeric" id="f-amount" required placeholder="0" />
    </div>
    <div class="field" id="priority-field">
      <label for="f-priority">Mức độ ưu tiên</label>
      <select id="f-priority"></select>
    </div>
    <div class="field" id="payment-field">
      <label for="f-payment">Phương thức thanh toán</label>
      <select id="f-payment"></select>
    </div>
    <div class="field">
      <label for="f-note">Ghi chú</label>
      <input type="text" id="f-note" placeholder="Ví dụ: ăn sáng bánh canh" />
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Lưu giao dịch</button>
  </form>
</main>
<script type="module" src="js/add.js"></script>
</body>
</html>
