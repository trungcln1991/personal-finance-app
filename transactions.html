<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0b1120" />
<title>Giao dịch — Sổ Thu Chi</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<main>
  <h1>Giao dịch</h1>

  <div class="month-switcher">
    <button id="prev-month">‹</button>
    <strong id="month-label">—</strong>
    <button id="next-month">›</button>
  </div>

  <div class="tx-filters">
    <select id="filter-type">
      <option value="">Tất cả loại</option>
      <option value="income">Thu</option>
      <option value="expense">Chi</option>
      <option value="transfer">Chuyển khoản</option>
    </select>
    <select id="filter-category"><option value="">Tất cả danh mục</option></select>
    <select id="filter-payment"><option value="">Tất cả phương thức</option></select>
    <select id="filter-priority"><option value="">Tất cả mức ưu tiên</option></select>
    <input type="text" id="filter-note" placeholder="Tìm theo ghi chú…" />
    <button id="filter-clear" class="btn btn-secondary">Xoá lọc</button>
  </div>

  <div id="loading" class="muted">Đang tải…</div>
  <p class="muted" id="filter-summary" style="display:none;"></p>
  <div class="tx-list" id="tx-list"></div>
</main>
<script type="module" src="js/transactions.js"></script>
</body>
</html>
